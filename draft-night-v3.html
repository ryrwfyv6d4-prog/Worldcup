<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dan's Shed — Draft Night 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f0c040;
    --gold-dim: #a07c1a;
    --red: #c0392b;
    --navy: #0a0e1a;
    --navy2: #111828;
    --green: #27ae60;
    --text: #e8e0d0;
    --text-dim: #8a8070;
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    position: relative;
  }

  /* scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 900;
  }

  /* grain */
  body::after {
    content: '';
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.3;
    z-index: 899;
    animation: grain 0.5s steps(2) infinite;
  }
  @keyframes grain {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-1%, 1%); }
    50% { transform: translate(1%, -1%); }
    75% { transform: translate(-1%, -1%); }
  }

  /* ── SCREEN MANAGER ── */
  .screen { display: none; width: 100vw; height: 100vh; position: fixed; inset: 0; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ── INTRO SCREEN ── */
  #screen-intro {
    background: radial-gradient(ellipse at center, #1a1228 0%, var(--navy) 70%);
    gap: 20px;
    text-align: center;
    padding: 40px;
  }
  .intro-logo { font-size: 5rem; margin-bottom: 8px; }
  .intro-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 9vw, 7rem);
    color: var(--gold);
    line-height: 1;
    letter-spacing: 0.02em;
    text-shadow: 0 0 40px rgba(240,192,64,0.4);
  }
  .intro-sub {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .intro-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 5vw, 3rem);
    color: var(--gold-dim);
    letter-spacing: 0.3em;
  }
  .intro-btn {
    margin-top: 32px;
    padding: 18px 52px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.1em;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(240,192,64,0.3);
  }
  .intro-btn:hover { background: #ffe080; transform: scale(1.03); }

  /* ── MAIN STAGE ── */
  #screen-stage {
    background: var(--navy);
    flex-direction: column;
    gap: 0;
    padding: 20px;
  }

  #stage { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .player-name-banner {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 7vw, 5rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    text-align: center;
    text-shadow: 0 0 30px rgba(240,192,64,0.3);
    min-height: 1.1em;
    transition: opacity 0.3s;
  }

  .tier-label {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: -8px;
  }

  /* ── CARD GRID ── */
  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(8px, 2vw, 16px);
    justify-content: center;
    align-items: center;
    max-width: 900px;
  }

  .card-wrap {
    perspective: 900px;
    width: clamp(90px, 18vw, 150px);
    height: clamp(120px, 24vw, 200px);
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: 2px solid;
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(145deg, #1e2640, #0d1220);
    border-color: #2a3550;
    font-size: 2.5rem;
  }
  .card-back::before {
    content: '⚽';
    font-size: 2.5rem;
    opacity: 0.15;
  }
  .card-front {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, #1e2a1a, #0d180a);
    border-color: var(--green);
    flex-direction: column;
  }
  .card-front.t1 {
    background: linear-gradient(145deg, #2a2000, #1a1200);
    border-color: var(--gold);
    border-width: 3px;
    box-shadow: 0 0 20px rgba(240,192,64,0.25);
  }
  .card-front.t2 {
    background: linear-gradient(145deg, #201a2a, #12101a);
    border-color: #9b59b6;
  }
  .card-front.t3 {
    background: linear-gradient(145deg, #1a2228, #0d1418);
    border-color: #3498db;
  }
  .card-front.t4 {
    background: linear-gradient(145deg, #1e2018, #0d100a);
    border-color: #7f8c8d;
  }

  .card-tier-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 2px 7px;
    border-radius: 3px;
    position: absolute;
    top: 7px;
    left: 7px;
  }
  .t1 .card-tier-badge { background: var(--gold); color: var(--navy); }
  .t2 .card-tier-badge { background: #9b59b6; color: #fff; }
  .t3 .card-tier-badge { background: #3498db; color: #fff; }
  .t4 .card-tier-badge { background: #7f8c8d; color: #fff; }

  .card-flag { width: 75%; aspect-ratio: 3/2; border-radius: 3px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
  .card-team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.7rem, 1.8vw, 1rem);
    letter-spacing: 0.05em;
    text-align: center;
    color: var(--text);
    padding: 0 6px;
    line-height: 1.1;
  }

  /* Bonus badge */
  .card-bonus .card-back { border-color: var(--gold-dim); }
  .card-bonus .card-back::before { content: '⭐'; }
  .bonus-badge {
    position: absolute;
    top: 7px;
    right: 7px;
    font-size: 0.55rem;
    font-family: 'Bebas Neue', sans-serif;
    background: var(--gold-dim);
    color: var(--navy);
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.1em;
  }

  /* ── COMMENTARY ── */
  .commentary-wrap {
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
    max-width: 800px;
  }
  .commentary-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    color: var(--gold);
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 0 20px rgba(240,192,64,0.3);
    min-height: 1.1em;
  }
  .commentary-sub {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.85rem, 2.2vw, 1.2rem);
    color: var(--text-dim);
    margin-top: 6px;
    min-height: 1.4em;
  }

  /* ── ADVANCE HINT ── */
  .advance-hint {
    position: fixed;
    bottom: 20px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.18);
    font-family: 'Special Elite', cursive;
    letter-spacing: 0.1em;
  }

  /* ── SPOTLIGHT ── */
  #spotlight-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 1.2s ease;
    z-index: 50;
  }
  #spotlight-overlay.on { background: rgba(0,0,0,0.82); }

  /* ── COUNTDOWN ── */
  #countdown-display {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    pointer-events: none;
  }
  #countdown-display.active { display: flex; }
  #countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(10rem, 25vw, 18rem);
    color: var(--gold);
    text-shadow: 0 0 60px rgba(240,192,64,0.6);
    animation: countdown-pop 0.8s ease-out forwards;
  }
  @keyframes countdown-pop {
    0% { transform: scale(1.6); opacity: 0; }
    40% { transform: scale(1); opacity: 1; }
    80% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.7); opacity: 0; }
  }

  /* ── FAKEOUT OVERLAY ── */
  #fakeout-overlay {
    position: fixed;
    inset: 0;
    background: rgba(150,0,0,0.0);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    gap: 20px;
    transition: background 0.4s;
  }
  #fakeout-overlay.active { display: flex; }
  #fakeout-overlay.flash { background: rgba(200,0,0,0.55); }
  #fakeout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 8rem);
    color: #ff2222;
    text-shadow: 0 0 40px #ff0000;
    letter-spacing: 0.05em;
    text-align: center;
  }
  #fakeout-msg {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1rem, 3vw, 2rem);
    color: var(--text);
    text-align: center;
    max-width: 700px;
    padding: 0 20px;
    min-height: 2em;
  }

  /* ── ANIMATIONS ── */
  @keyframes stage-shake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    15% { transform: translateX(-12px) rotate(-1deg); }
    30% { transform: translateX(12px) rotate(1deg); }
    45% { transform: translateX(-8px) rotate(-0.5deg); }
    60% { transform: translateX(8px) rotate(0.5deg); }
    75% { transform: translateX(-4px); }
    90% { transform: translateX(4px); }
  }

  @keyframes flash-gold {
    0%,100% { background: var(--navy); }
    50% { background: #3a2800; }
  }
  @keyframes flash-red {
    0%,100% { background: var(--navy); }
    50% { background: #3a0000; }
  }

  .pt {
    position: fixed;
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    pointer-events: none;
    z-index: 800;
    animation: particle-burst 1.1s ease-out forwards;
  }
  @keyframes particle-burst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* ── DONE SCREEN ── */
  #screen-done {
    background: radial-gradient(ellipse at center, #1a2010 0%, var(--navy) 70%);
    gap: 24px;
    text-align: center;
    padding: 40px;
  }
  .done-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 9vw, 7rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(240,192,64,0.4);
  }
  .done-sub {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: var(--text-dim);
  }
  .done-restart {
    margin-top: 20px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .done-restart:hover { background: var(--gold); color: var(--navy); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <div class="intro-logo">🏟️</div>
  <div class="intro-title">DAN'S SHED</div>
  <div class="intro-year">WORLD CUP 2026</div>
  <div class="intro-sub">The Official Draft Night Experience</div>
  <button class="intro-btn" onclick="startShow()">BEGIN THE DRAW</button>
</div>

<!-- STAGE -->
<div id="screen-stage" class="screen">
  <div id="stage">
    <div class="player-name-banner" id="player-banner">—</div>
    <div class="tier-label" id="tier-label"></div>
    <div class="card-grid" id="card-grid"></div>
    <div class="commentary-wrap">
      <div class="commentary-headline" id="commentary-headline"></div>
      <div class="commentary-sub" id="commentary-sub"></div>
    </div>
  </div>
  <div class="advance-hint" id="advance-hint">SPACE or tap to advance</div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div style="font-size:4rem">🏆</div>
  <div class="done-title">THE DRAW IS DONE</div>
  <div class="done-sub">May the best shed win.<br>Good luck. You'll need it.</div>
  <button class="done-restart" onclick="location.reload()">Run Again</button>
</div>

<!-- overlays -->
<div id="spotlight-overlay"></div>
<div id="countdown-display"><div id="countdown-num">3</div></div>
<div id="fakeout-overlay">
  <div id="fakeout-title">⚠️ INTELLIGENCE ERROR ⚠️</div>
  <div id="fakeout-msg"></div>
</div>

<script>
// ─────────────────────────────────────────────
// DRAW DATA — edit this to match your actual draw
// ─────────────────────────────────────────────

// SVG flag definitions — simple geometric representations
// Each returns an SVG string at 60x40 viewBox
function flag(svg) { return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" style="width:100%;height:100%;display:block;border-radius:3px">${svg}</svg>`; }
function h3(a,b,c){ return `<rect width="60" height="13.3" y="0" fill="${a}"/><rect width="60" height="13.3" y="13.3" fill="${b}"/><rect width="60" height="13.4" y="26.6" fill="${c}"/>`; }
function v3(a,b,c){ return `<rect width="20" height="40" x="0" fill="${a}"/><rect width="20" height="40" x="20" fill="${b}"/><rect width="20" height="40" x="40" fill="${c}"/>`; }
function cross(bg,cc,ch,cw=6,hw=6){ return `<rect width="60" height="40" fill="${bg}"/><rect width="60" height="${cw}" y="${(40-cw)/2}" fill="${cc}"/><rect width="${hw}" height="40" x="${(60-hw)/2}" fill="${ch}"/>`; }

const FLAGS = {
  'France':      flag(v3('#002395','#fff','#ED2939')),
  'Spain':       flag(`${h3('#AA151B','#F1BF00','#AA151B')}<rect width="10" height="20" x="5" y="10" fill="#AA151B" opacity=".3"/>`),
  'Argentina':   flag(`${h3('#74ACDF','#fff','#74ACDF')}<circle cx="30" cy="20" r="5" fill="#F6B40E"/>`),
  'England':     flag(`<rect width="60" height="40" fill="#fff"/><rect width="60" height="8" y="16" fill="#CF142B"/><rect width="8" height="40" x="26" fill="#CF142B"/>`),
  'Portugal':    flag(`${v3('#006600','#fff','#DA020E')}<rect width="2" height="40" x="20" fill="#006600"/><circle cx="22" cy="20" r="5" fill="#006600"/><circle cx="22" cy="20" r="3.5" fill="#EFC44A"/>`),
  'Brazil':      flag(`<rect width="60" height="40" fill="#009C3B"/><polygon points="30,4 56,20 30,36 4,20" fill="#FEDF00"/><circle cx="30" cy="20" r="8" fill="#002776"/>`),
  'Netherlands': flag(h3('#AE1C28','#fff','#1E4785')),
  'Morocco':     flag(`<rect width="60" height="40" fill="#C1272D"/><polygon points="30,13 32.9,21.5 41.6,21.5 34.8,26.5 37.4,35 30,30 22.6,35 25.2,26.5 18.4,21.5 27.1,21.5" fill="none" stroke="#006233" stroke-width="1.5"/>`),
  'Belgium':     flag(v3('#000','#FAE042','#EF3340')),
  'Germany':     flag(h3('#000','#D00','#FFCE00')),
  'Croatia':     flag(`${h3('#FF0000','#fff','#0093DD')}<rect width="60" height="13.3" y="13.3" fill="#fff"/><rect width="6" height="6" x="0" y="13" fill="#f00"/><rect width="6" height="6" x="6" y="13" fill="#fff"/><rect width="6" height="6" x="12" y="13" fill="#f00"/><rect width="6" height="6" x="3" y="19" fill="#fff"/><rect width="6" height="6" x="9" y="19" fill="#f00"/>`),
  'Colombia':    flag(h3('#FCD116','#003087','#CE1126')),
  'Uruguay':     flag(`<rect width="60" height="40" fill="#fff"/>${[0,1,2,3,4,5,6,7,8].map(i=>`<rect width="60" height="2.2" y="${i*4.4+2.2}" fill="#75AADB"/>`).join('')}<rect width="30" height="20" fill="#fff"/><circle cx="15" cy="10" r="5" fill="#FCD116"/>`),
  'USA':         flag(`<rect width="60" height="40" fill="#B22234"/>${[1,3,5,7,9,11].map(i=>`<rect width="60" height="3.1" y="${i*3.1}" fill="#fff"/>`).join('')}<rect width="24" height="21.7" fill="#3C3B6E"/>`),
  'Mexico':      flag(`${v3('#006847','#fff','#CE1126')}<circle cx="30" cy="20" r="5" fill="#006847" opacity=".5"/>`),
  'Japan':       flag(`<rect width="60" height="40" fill="#fff"/><circle cx="30" cy="20" r="10" fill="#BC002D"/>`),
  'Senegal':     flag(`${v3('#00853F','#FDEF42','#E31B23')}<polygon points="30,14 31.5,19 36,19 32.5,22 33.8,27 30,24 26.2,27 27.5,22 24,19 28.5,19" fill="#00853F"/>`),
  'Ecuador':     flag(h3('#FFD100','#003DA5','#EF3340')),
  'Switzerland': flag(`<rect width="60" height="40" fill="#FF0000"/><rect width="8" height="24" x="26" y="8" fill="#fff"/><rect width="24" height="8" x="18" y="16" fill="#fff"/>`),
  'Norway':      flag(`<rect width="60" height="40" fill="#EF2B2D"/><rect width="60" height="8" y="16" fill="#fff"/><rect width="8" height="40" x="18" fill="#fff"/><rect width="60" height="4" y="18" fill="#002868"/><rect width="4" height="40" x="20" fill="#002868"/>`),
  'Turkey':      flag(`<rect width="60" height="40" fill="#E30A17"/><circle cx="26" cy="20" r="9" fill="#fff"/><circle cx="29" cy="20" r="7" fill="#E30A17"/><polygon points="40,20 36,17.5 37,21 34,18.5 38,18.5" fill="#fff" transform="rotate(-18,38,20)"/>`),
  'South Korea': flag(`<rect width="60" height="40" fill="#fff"/><circle cx="30" cy="20" r="9" fill="#CD2E3A"/><path d="M30,11 A9,9,0,0,1,30,29 Z" fill="#003478"/>`),
  'Iran':        flag(`${h3('#239F40','#fff','#DA0000')}<rect width="60" height="2" y="12.6" fill="#239F40"/><rect width="60" height="2" y="25.4" fill="#DA0000"/>`),
  'Austria':     flag(h3('#ED2939','#fff','#ED2939')),
  'Canada':      flag(`${v3('#FF0000','#fff','#FF0000')}<polygon points="30,10 32,17 39,17 33.5,21.5 35.5,28.5 30,24 24.5,28.5 26.5,21.5 21,17 28,17" fill="#FF0000"/>`),
  'Algeria':     flag(`${v3('#006233','#fff','#fff')}<circle cx="33" cy="20" r="7" fill="#fff"/><circle cx="35" cy="20" r="7" fill="#006233"/><polygon points="39,14 40,17.5 43,16 41.5,19 45,20 41.5,21 43,24 40,22.5 39,26 38,22.5 35,24 36.5,21 33,20 36.5,19 35,16 38,17.5" fill="#D21034" transform="translate(-4,0) scale(0.6) translate(6.5,13)"/>`),

// ─────────────────────────────────────────────
// SHOW STATE MACHINE
// ─────────────────────────────────────────────

// Steps: for each player we build a sequence of actions
// action types: show_player, deal_cards, flip_t4, flip_t3, flip_t2, spotlight_t1, flip_t1, done

let steps = [];
let stepIdx = 0;
let busy = false;

function buildSteps() {
  steps = [];
  PLAYERS.forEach((p, pi) => {
    steps.push({ type: 'show_player', player: p });
    steps.push({ type: 'deal_cards',  player: p });
    steps.push({ type: 'flip_tier', player: p, tier: 't4' });
    steps.push({ type: 'flip_tier', player: p, tier: 't3' });
    steps.push({ type: 'flip_tier', player: p, tier: 't2' });
    if (p.fakeout) {
      steps.push({ type: 'spotlight_then_flip', player: p, isFakeout: true });
      steps.push({ type: 'fakeout_reveal', player: p });
      steps.push({ type: 'fakeout_error',  player: p });
      steps.push({ type: 'fakeout_fix_then_flip', player: p });
    } else {
      steps.push({ type: 'spotlight_then_flip', player: p, isFakeout: false });
    }
    if (p.bonusTeam) {
      steps.push({ type: 'flip_bonus', player: p });
    }
  });
  steps.push({ type: 'done' });
}

function startShow() {
  buildSteps();
  showScreen('screen-stage');
  document.addEventListener('keydown', onKey);
  document.getElementById('screen-stage').addEventListener('click', onTap);
  runStep();
}

function onKey(e) { if (e.code === 'Space' || e.code === 'ArrowRight') { e.preventDefault(); advance(); } }
function onTap(e) { if (!e.target.closest('button')) advance(); }

function advance() {
  if (busy) return;
  stepIdx++;
  if (stepIdx < steps.length) runStep();
}

async function runStep() {
  const step = steps[stepIdx];
  if (!step) return;

  busy = true;

  switch (step.type) {
    case 'show_player':
      await doShowPlayer(step.player);
      break;
    case 'deal_cards':
      await doDealCards(step.player);
      break;
    case 'flip_tier':
      await doFlipTier(step.player, step.tier);
      break;
    case 'spotlight_then_flip':
      await doSpotlight(step.player);
      await doFlipT1(step.player);
      break;
    case 'fakeout_reveal':
      await doFakeoutReveal(step.player);
      break;
    case 'fakeout_error':
      await doFakeoutError(step.player);
      break;
    case 'fakeout_fix_then_flip':
      await doFakeoutFix(step.player);
      await doFlipT1(step.player);
      break;
    case 'flip_bonus':
      await doFlipBonus(step.player);
      break;
    case 'done':
      showScreen('screen-done');
      break;
  }

  busy = false;
}

async function doShowPlayer(p) {
  clearCommentary();
  setPlayerBanner(p.name.toUpperCase());
  setTierLabel('');
  document.getElementById('card-grid').innerHTML = '';
  flashBg('gold', 350);
  await wait(300);
}

async function doDealCards(p) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  const tiers = ['t4','t3','t2','t1'];
  for (const t of tiers) {
    const wrap = makeCardBack(t, p.fakeout && t === 't1');
    wrap.id = `card-${p.name}-${t}`;
    grid.appendChild(wrap);
    await wait(180);
  }
  if (p.bonusTeam) {
    const wrap = makeCardBack('bonus', false);
    wrap.id = `card-${p.name}-bonus`;
    grid.appendChild(wrap);
    await wait(180);
  }
}

async function doFlipTier(p, tier) {
  const team = p[tier];
  const flag = FLAGS[team] || '🏳️';
  const lines = TEAM_LINES[team] || [team.toUpperCase(), 'On the world stage.'];
  setTierLabel(TIER_LABELS[tier]);

  drumroll(0.3);
  await wait(300);
  flipCard(`card-${p.name}-${tier}`, team, flag, tier);
  await wait(400);
  stageShake(300);
  spawnParticles(tier === 't4' ? '⚽' : tier === 't3' ? '🌟' : '💫', tier === 't4' ? 6 : 8);
  await typeCommentary(lines[0], lines[1]);
  await wait(200);
}

async function doSpotlight(p) {
  clearCommentary();
  setCommentary('THE MOMENT OF TRUTH', `${p.name.toUpperCase()}'s Tier 1 team is about to be revealed...`);
  setTierLabel(TIER_LABELS.t1);
  document.getElementById('spotlight-overlay').classList.add('on');
  await wait(600);
  // Bring just the T1 card to front visually
  const card = document.getElementById(`card-${p.name}-t1`);
  if (card) { card.style.position='relative'; card.style.zIndex='60'; }
  await doCountdown();
}

async function doCountdown() {
  for (const n of ['3','2','1']) {
    const el = document.getElementById('countdown-num');
    el.textContent = n;
    document.getElementById('countdown-display').classList.add('active');
    await wait(900);
    document.getElementById('countdown-display').classList.remove('active');
    await wait(100);
  }
}

async function doFakeoutReveal(p) {
  // Flip to the fakeout team
  const fakeTeam = p.fakeout;
  const fakeFlag = FLAGS[fakeTeam] || '🏳️';
  flipCard(`card-${p.name}-t1`, fakeTeam, fakeFlag, 't1');
  stageShake(500);
  flashBg('red', 600);
  spawnParticles('😱', 12);
  clearCommentary();
  setCommentary(`${fakeTeam.toUpperCase()}`, 'Wait... WHAT.');
  await wait(2800); // let the room react
}

async function doFakeoutError(p) {
  document.getElementById('fakeout-overlay').classList.add('active');
  await wait(200);
  document.getElementById('fakeout-overlay').classList.add('flash');
  await wait(300);
  document.getElementById('fakeout-overlay').classList.remove('flash');

  await typeEl('fakeout-msg', '⚠️  DRAW DATABASE CORRUPTION DETECTED  ⚠️\n\nIntelligence sources confirm incorrect team assignment.\nConducting emergency re-draw for ' + p.name.toUpperCase() + '...');
  await wait(2000);
}

async function doFakeoutFix(p) {
  document.getElementById('fakeout-overlay').classList.remove('active');
  document.getElementById('spotlight-overlay').classList.add('on');

  // Reset the T1 card back to face-down
  const card = document.getElementById(`card-${p.name}-t1`);
  if (card) {
    const inner = card.querySelector('.card-inner');
    inner.classList.remove('flipped');
  }
  clearCommentary();
  setCommentary('RECALIBRATING...', 'Stand by for correct assignment.');
  await wait(1200);
  await doCountdown();
}

async function doFlipT1(p) {
  const team = p.t1;
  const flag = FLAGS[team] || '🏳️';
  const lines = TEAM_LINES[team] || [team.toUpperCase(), 'A Tier 1 team. Respect.'];

  flipCard(`card-${p.name}-t1`, team, flag, 't1');
  stageShake(600);
  flashBg('gold', 800);
  spawnParticles('🎉', 10);
  spawnParticles('⭐', 8);
  spawnParticles('🔥', 6);

  document.getElementById('spotlight-overlay').classList.remove('on');
  // Reset z-index
  const card = document.getElementById(`card-${p.name}-t1`);
  if (card) { card.style.position=''; card.style.zIndex=''; }

  await typeCommentary(lines[0], lines[1]);
  await wait(300);
}

async function doFlipBonus(p) {
  const team = p.bonusTeam;
  const flag = FLAGS[team] || '🏳️';
  setTierLabel('BONUS TEAM ⭐');
  drumroll(0.2);
  await wait(300);
  flipCard(`card-${p.name}-bonus`, team, flag, 'bonus');
  spawnParticles('⭐', 8);
  await typeCommentary('BONUS TEAM INCOMING', `${team} — surprise fifth entry into the sweep.`);
  await wait(200);
}

function makeCardBack(tier, isFakeout) {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap' + (tier === 'bonus' ? ' card-bonus' : '');
  const inner = document.createElement('div');
  inner.className = 'card-inner';
  const back = document.createElement('div');
  back.className = 'card-face card-back';
  if (tier === 'bonus') {
    const b = document.createElement('span');
    b.className = 'bonus-badge';
    b.textContent = 'BONUS';
    back.appendChild(b);
  }
  inner.appendChild(back);
  // placeholder front
  const front = document.createElement('div');
  front.className = `card-face card-front ${tier === 'bonus' ? 't4' : tier}`;
  inner.appendChild(front);
  wrap.appendChild(inner);
  return wrap;
}

function flipCard(id, team, flag, tier) {
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const inner = wrap.querySelector('.card-inner');
  // Build the front face
  const front = inner.querySelector('.card-face.card-front');
  front.innerHTML = '';
  front.className = `card-face card-front ${tier === 'bonus' ? 't4' : tier}`;

  const badge = document.createElement('div');
  badge.className = 'card-tier-badge';
  badge.textContent = tier === 'bonus' ? 'BONUS' : tier.toUpperCase();
  front.appendChild(badge);

  const flagEl = document.createElement('div');
  flagEl.className = 'card-flag';
  flagEl.innerHTML = flag;
  front.appendChild(flagEl);

  const nameEl = document.createElement('div');
  nameEl.className = 'card-team-name';
  nameEl.textContent = team;
  front.appendChild(nameEl);

  inner.classList.add('flipped');
}

function setPlayerBanner(name) {
  document.getElementById('player-banner').textContent = name;
}

function setTierLabel(txt) {
  document.getElementById('tier-label').textContent = txt;
}

function setCommentary(headline, sub) {
  document.getElementById('commentary-headline').textContent = headline;
  document.getElementById('commentary-sub').textContent = sub;
}

function clearCommentary() {
  document.getElementById('commentary-headline').textContent = '';
  document.getElementById('commentary-sub').textContent = '';
}

async function typeCommentary(headline, sub) {
  await typeEl('commentary-headline', headline, 28);
  await typeEl('commentary-sub', sub, 18);
}

function typeEl(id, text, speed = 22) {
  return new Promise(resolve => {
    const el = document.getElementById(id);
    el.textContent = '';
    let i = 0;
    const tick = () => {
      if (i < text.length) {
        el.textContent += text[i++];
        setTimeout(tick, speed + Math.random() * speed * 0.5);
      } else {
        resolve();
      }
    };
    tick();
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function flashBg(colour, dur) {
  document.body.style.animation = `flash-${colour === 'gold' ? 'gold' : 'red'} ${dur}ms ease-in-out`;
  setTimeout(() => document.body.style.animation = '', dur);
}

function stageShake(dur) {
  const s = document.getElementById('stage');
  s.style.animation = `stage-shake ${dur}ms ease-in-out`;
  setTimeout(() => s.style.animation = '', dur);
}

function spawnParticles(emoji, n) {
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'pt';
      el.textContent = emoji;
      el.style.left = (8 + Math.random() * 84) + 'vw';
      el.style.top  = (8 + Math.random() * 84) + 'vh';
      el.style.setProperty('--dx', (Math.random() - 0.5) * 500 + 'px');
      el.style.setProperty('--dy', (Math.random() - 0.5) * 500 + 'px');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }, i * 60);
  }
}

function drumroll(vol = 0.3) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const g = ctx.createGain();
    g.gain.value = vol;
    g.connect(ctx.destination);
    for (let i = 0; i < 12; i++) {
      setTimeout(() => {
        const o = ctx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = 90 + Math.random() * 20;
        o.connect(g);
        o.start();
        o.stop(ctx.currentTime + 0.04);
      }, i * 25);
    }
  } catch(e) {}
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
