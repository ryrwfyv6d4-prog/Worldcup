name: Deploy

on:
  push:
    branches: [claude/world-cup-sweep-app-oFZHS]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          VITE_WALL_API_URL: https://worldcup.phil-remington.workers.dev

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
