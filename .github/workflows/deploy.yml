name: Deploy

on:
  push:
    branches: [claude/world-cup-sweep-app-oFZHS]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      - name: Deploy Cloudflare Worker
        id: worker
        working-directory: worker
        run: |
          npx wrangler r2 bucket create dans-shed-wall 2>/dev/null || true

          echo "=== Deploying Worker ==="
          DEPLOY_OUT=$(npx wrangler deploy 2>&1)
          echo "$DEPLOY_OUT"

          echo "=== Cloudflare API: workers subdomain ==="
          CF_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/1f0d20dfb82aac0372345af33233ed89/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          echo "$CF_RESP"

          SUBDOMAIN=$(echo "$CF_RESP" | jq -r '.result.subdomain // empty' 2>/dev/null)

          # Fallback: parse URL directly from wrangler deploy output
          if [ -z "$SUBDOMAIN" ]; then
            URL=$(echo "$DEPLOY_OUT" | grep -oE 'https://[^[:space:]]+\.workers\.dev' | head -1)
          else
            URL="https://dans-shed-wall.${SUBDOMAIN}.workers.dev"
          fi

          echo "=== WORKER URL: $URL ==="
          if [ -n "$URL" ]; then
            echo "url=$URL" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Build React app
        run: npm run build
        env:
          VITE_WALL_API_URL: ${{ steps.worker.outputs.url || vars.VITE_WALL_API_URL || '' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
