name: Deploy

on:
  push:
    branches: [claude/world-cup-sweep-app-oFZHS]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      # No continue-on-error — we need to see if this step actually works.
      # If it fails, check the error: likely the API token needs
      # "Workers Scripts: Edit" permission added in the Cloudflare dashboard.
      - name: Deploy Cloudflare Worker
        working-directory: worker
        run: |
          echo "Token prefix: ${CLOUDFLARE_API_TOKEN:0:8}..."
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build React app
        run: npm run build
        env:
          VITE_WALL_API_URL: https://worldcup.phil-remington.workers.dev

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
