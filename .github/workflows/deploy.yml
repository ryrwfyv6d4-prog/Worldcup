name: Deploy

on:
  push:
    branches: [claude/world-cup-sweep-app-oFZHS]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      # Deploy the Cloudflare Worker + R2 bucket
      - name: Deploy Cloudflare Worker
        id: worker
        working-directory: worker
        run: |
          npx wrangler r2 bucket create dans-shed-wall 2>/dev/null || true
          npx wrangler deploy 2>&1

          # Get workers.dev subdomain from Cloudflare API (more reliable than parsing wrangler output)
          SUBDOMAIN=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/1f0d20dfb82aac0372345af33233ed89/workers/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | jq -r '.result.subdomain // empty')

          if [ -n "$SUBDOMAIN" ]; then
            URL="https://dans-shed-wall.${SUBDOMAIN}.workers.dev"
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "Worker URL: $URL"
          else
            echo "Could not determine workers subdomain"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Build React app
        run: npm run build
        env:
          VITE_WALL_API_URL: ${{ steps.worker.outputs.url || vars.VITE_WALL_API_URL || '' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
