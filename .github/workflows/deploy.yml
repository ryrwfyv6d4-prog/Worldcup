name: Deploy

on:
  push:
    branches: [claude/world-cup-sweep-app-oFZHS]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      # Requires a Cloudflare API token with "Workers Scripts: Edit" permission.
      # The cfut_... token is R2-only — create a new one at:
      # dash.cloudflare.com/profile/api-tokens → Edit Cloudflare Workers template
      # then update the CLOUDFLARE_API_TOKEN repo secret.
      - name: Deploy Cloudflare Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Build React app
        run: npm run build
        env:
          VITE_WALL_API_URL: https://worldcup.phil-remington.workers.dev

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
