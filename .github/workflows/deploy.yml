name: Deploy

on:
  push:
    branches: [claude/world-cup-sweep-app-oFZHS]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      # Create the R2 bucket if it doesn't exist.
      # The Cloudflare GitHub App deploys the Worker separately — it needs
      # the bucket to already exist or the wrangler deploy will fail.
      - name: Ensure R2 bucket exists
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/1f0d20dfb82aac0372345af33233ed89/r2/buckets" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "dans-shed-wall"}')
          echo "$RESULT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Build React app
        run: npm run build
        env:
          VITE_WALL_API_URL: https://worldcup.phil-remington.workers.dev

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: false
